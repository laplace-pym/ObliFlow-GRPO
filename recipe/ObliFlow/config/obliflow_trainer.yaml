hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}

reward_model:
  reward_manager: episode
  overlong_buffer:
    enable: False
    len: 0
    penalty_factor: 0.0
    log: False

algorithm:
  adv_estimator: obliflow
  gamma: 1.0
  obliflow:
    alpha: 1.0
    beta: 0.3
    lambda_cost: 0.02
    eta_waste: 0.20
    rho_break: 0.50
    mode: "mean_std_norm"  # "mean_norm" or "mean_std_norm"
    solver: "prefix_greedy"
    use_min_cut: True
    use_waste_penalty: True
    use_terminal_reward: True
    enable_posthoc_extractor: True
    enable_ledger_tags: False
    log_flow_graph: False
    log_flow_examples: 2
  filter_groups:
    enable: False
    metric: null
    max_num_gen_batches: 0

env:
  webshop:
    observation_mode: text_rich

trainer:
  project_name: verl-obliflow
  val_out: False
  val_only: False
  test_only: False
