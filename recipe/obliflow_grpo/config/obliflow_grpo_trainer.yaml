hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

data:
  gen_batch_size: ${data.train_batch_size}

reward_model:
  reward_manager: episode
  overlong_buffer:
    enable: False
    len: 0
    penalty_factor: 0.0
    log: False

algorithm:
  adv_estimator: obliflow_grpo
  gamma: 0.10  # small gamma suited for graph-distance-based returns
  obliflow_grpo:
    step_advantage_w: 1.0
    episode_advantage_w: 1.0
    mode: "mean_std_norm"  # "mean_norm" or "mean_std_norm"
    enable_similarity: False  # whether to merge similar observations into one graph node
    similarity_thresh: 0.95   # similarity threshold (0.0, 1.0), used when enable_similarity=True
    normalize_distance: False  # if True, use distance delta instead of absolute distance
  filter_groups:
    enable: False
    metric: null
    max_num_gen_batches: 0

env:
  webshop:
    observation_mode: text_rich

trainer:
  project_name: obliflow-grpo
  val_out: False
  val_only: False
  test_only: False
